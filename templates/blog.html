<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Reunna Eventos</title>
<meta name="description" content="Dicas, novidades e conteúdos sobre eventos em condomínios, feiras e ações promocionais.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root{
    --vinho:#7D1538;--vinho-escuro:#3E0B1C;--vinho-suave:#A8345C;
    --dourado:#C7973A;--dourado-claro:#E7C77E;--creme:#FBF6EF;
    --rosa-suave:#F4E6EA;--carvao:#2B1F26;--cinza:#7C7079;
    --linha:#E7DAD9;--branco:#FFFFFF;
    --sombra:0 20px 50px -20px rgba(61,11,28,.35);--raio:4px;
  }
  *{box-sizing:border-box;}html{scroll-behavior:smooth;}
  body{margin:0;font-family:'Inter',sans-serif;color:var(--carvao);background:var(--creme);-webkit-font-smoothing:antialiased;}
  h1,h2,h3,h4{font-family:'Playfair Display',serif;margin:0;font-weight:600;}
  p{margin:0;}a{text-decoration:none;color:inherit;}img{max-width:100%;display:block;}
  .container{max-width:1180px;margin:0 auto;padding:0 24px;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:15px 30px;border-radius:var(--raio);font-weight:600;font-size:14.5px;border:1px solid transparent;transition:transform .25s,box-shadow .25s,background .25s,color .25s;letter-spacing:.2px;font-family:'Inter',sans-serif;cursor:pointer;}
  .btn-ghost{border-color:var(--linha);color:var(--vinho);background:#fff;}
  .btn-ghost:hover{border-color:var(--vinho);background:var(--rosa-suave);}

  header.site{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(251,246,239,.95);backdrop-filter:blur(10px);padding:14px 0;box-shadow:0 4px 20px -8px rgba(61,11,28,.15);}
  .nav-wrap{display:flex;align-items:center;justify-content:space-between;}
  .brand{display:flex;align-items:center;gap:10px;font-family:'Playfair Display',serif;font-weight:700;font-size:21px;color:var(--vinho-escuro);}
  .brand .ring{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--dourado);display:flex;align-items:center;justify-content:center;color:var(--dourado);font-size:14px;}
  nav.links{display:flex;gap:32px;align-items:center;}
  nav.links a{color:var(--carvao);font-size:14.5px;font-weight:500;position:relative;padding-bottom:4px;}
  nav.links a::after{content:'';position:absolute;left:0;bottom:0;height:1px;width:0;background:var(--dourado);transition:width .25s;}
  nav.links a:hover::after{width:100%;}
  .hamburger{display:none;background:none;border:none;color:var(--vinho-escuro);font-size:22px;cursor:pointer;}
  .mobile-menu{position:fixed;inset:0;background:var(--vinho-escuro);z-index:60;display:flex;flex-direction:column;padding:28px 24px;transform:translateY(-100%);transition:transform .35s ease;}
  .mobile-menu.open{transform:translateY(0);}
  .mobile-menu .mclose{align-self:flex-end;background:none;border:none;color:#fff;font-size:24px;cursor:pointer;}
  .mobile-menu a{color:#fff;font-family:'Playfair Display',serif;font-size:24px;padding:16px 0;border-bottom:1px solid rgba(255,255,255,.12);}

  /* HERO BLOG */
  .blog-hero{
    margin-top:66px;
    background:linear-gradient(160deg,var(--vinho-escuro) 0%,var(--vinho) 100%);
    padding:72px 0;position:relative;overflow:hidden;text-align:center;
  }
  .blog-hero::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 50%, rgba(199,151,58,.15), transparent 60%);pointer-events:none;}
  .blog-hero .eyebrow{display:inline-flex;align-items:center;gap:10px;font-family:'Playfair Display',serif;font-style:italic;color:var(--dourado-claro);font-size:15px;margin-bottom:16px;}
  .blog-hero .eyebrow::before{content:'';width:28px;height:1px;background:var(--dourado-claro);}
  .blog-hero h1{color:#fff;font-size:clamp(32px,5vw,52px);margin-bottom:16px;position:relative;z-index:2;}
  .blog-hero p{color:rgba(255,255,255,.75);font-size:17px;max-width:560px;margin:0 auto;line-height:1.65;position:relative;z-index:2;}

  /* BLOG GRID */
  .blog-section{padding:80px 0;}
  .blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px;}
  .post-card{background:#fff;border-radius:8px;overflow:hidden;border:1px solid var(--linha);transition:transform .3s,box-shadow .3s;display:block;}
  .post-card:hover{transform:translateY(-5px);box-shadow:var(--sombra);}
  .post-foto{aspect-ratio:16/10;overflow:hidden;background:var(--rosa-suave);}
  .post-foto img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease;}
  .post-card:hover .post-foto img{transform:scale(1.04);}
  .post-body{padding:24px 26px 28px;}
  .post-data{font-size:12px;color:var(--dourado);text-transform:uppercase;letter-spacing:.5px;font-weight:700;display:block;margin-bottom:10px;}
  .post-body h3{font-size:20px;line-height:1.3;margin-bottom:10px;}
  .post-body p{font-size:14.5px;color:var(--cinza);line-height:1.65;margin-bottom:18px;}
  .post-meta{display:flex;align-items:center;justify-content:space-between;}
  .post-autor{font-size:13px;color:var(--cinza);display:flex;align-items:center;gap:6px;}
  .post-link{font-size:13.5px;font-weight:600;color:var(--vinho);display:inline-flex;align-items:center;gap:6px;}
  .post-link i{font-size:11px;transition:transform .2s;}
  .post-card:hover .post-link i{transform:translateX(4px);}

  .skeleton{background:linear-gradient(90deg,#eee,#f6f1ec,#eee);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px;}
  @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
  .empty-state{text-align:center;padding:80px 20px;color:var(--cinza);grid-column:1/-1;}
  .empty-state i{font-size:40px;color:var(--dourado);margin-bottom:16px;display:block;}

  footer{background:var(--vinho-escuro);color:rgba(255,255,255,.75);padding:40px 0;}
  .footer-inner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;}

  @media(max-width:900px){.blog-grid{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:680px){nav.links{display:none;}.hamburger{display:block;}.blog-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header class="site">
  <div class="container nav-wrap">
    <a href="/" class="brand"><span class="ring"><i class="fa-solid fa-gem"></i></span> Reunna Eventos</a>
    <nav class="links">
      <a href="/#sobre">Sobre</a>
      <a href="/#servicos">Serviços</a>
      <a href="/#expositores">Expositores</a>
      <a href="/blog" style="color:var(--vinho);font-weight:700;">Blog</a>
      <a href="/#contato" class="btn btn-ghost" style="padding:10px 20px;">Fale Conosco</a>
    </nav>
    <button class="hamburger" id="hamburgerBtn"><i class="fa-solid fa-bars"></i></button>
  </div>
</header>

<div class="mobile-menu" id="mobileMenu">
  <button class="mclose" id="mobileCloseBtn"><i class="fa-solid fa-xmark"></i></button>
  <a href="/#sobre">Sobre</a>
  <a href="/#servicos">Serviços</a>
  <a href="/#expositores">Expositores</a>
  <a href="/blog">Blog</a>
  <a href="/#contato">Fale Conosco</a>
</div>

<div class="blog-hero">
  <div class="container" style="position:relative;z-index:2;">
    <div class="eyebrow">Conteúdo</div>
    <h1>Blog Reunna Eventos</h1>
    <p>Dicas, novidades e inspirações sobre eventos em condomínios, feiras e ações promocionais.</p>
  </div>
</div>

<section class="blog-section">
  <div class="container">
    <div class="blog-grid" id="blogGrid">
      <div class="post-card"><div class="skeleton" style="aspect-ratio:16/10;"></div><div style="padding:24px 26px;"><div class="skeleton" style="height:12px;width:40%;margin-bottom:12px;"></div><div class="skeleton" style="height:22px;width:90%;margin-bottom:8px;"></div><div class="skeleton" style="height:14px;width:100%;margin-bottom:6px;"></div></div></div>
      <div class="post-card"><div class="skeleton" style="aspect-ratio:16/10;"></div><div style="padding:24px 26px;"><div class="skeleton" style="height:12px;width:40%;margin-bottom:12px;"></div><div class="skeleton" style="height:22px;width:90%;margin-bottom:8px;"></div><div class="skeleton" style="height:14px;width:100%;margin-bottom:6px;"></div></div></div>
      <div class="post-card"><div class="skeleton" style="aspect-ratio:16/10;"></div><div style="padding:24px 26px;"><div class="skeleton" style="height:12px;width:40%;margin-bottom:12px;"></div><div class="skeleton" style="height:22px;width:90%;margin-bottom:8px;"></div><div class="skeleton" style="height:14px;width:100%;margin-bottom:6px;"></div></div></div>
    </div>
  </div>
</section>

<footer>
  <div class="container footer-inner">
    <a href="/" class="brand" style="color:#fff;"><span class="ring"><i class="fa-solid fa-gem"></i></span> Reunna Eventos</a>
    <span style="font-size:13px;">&copy; <span id="anoAtual"></span> Reunna Eventos. Todos os direitos reservados.</span>
  </div>
</footer>

<script>
document.getElementById('anoAtual').textContent = new Date().getFullYear();
const hamburgerBtn = document.getElementById('hamburgerBtn');
const mobileMenu = document.getElementById('mobileMenu');
const mobileCloseBtn = document.getElementById('mobileCloseBtn');
hamburgerBtn.addEventListener('click', () => mobileMenu.classList.add('open'));
mobileCloseBtn.addEventListener('click', () => mobileMenu.classList.remove('open'));
mobileMenu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => mobileMenu.classList.remove('open')));

function escapeHtml(str){
  if(!str) return '';
  return String(str).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');
}

async function carregarBlog(){
  const grid = document.getElementById('blogGrid');
  try{
    const res = await fetch('/api/blog');
    if(!res.ok) throw new Error();
    const posts = await res.json();
    if(!posts.length){
      grid.innerHTML = `<div class="empty-state"><i class="fa-solid fa-newspaper"></i><p>Em breve novos conteúdos no blog.</p></div>`;
      return;
    }
    grid.innerHTML = posts.map(p => `
      <a href="/blog/${p.slug}" class="post-card">
        <div class="post-foto"><img src="${p.imagem_url || 'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80&w=700&auto=format&fit=crop'}" alt="${escapeHtml(p.titulo)}" loading="lazy"></div>
        <div class="post-body">
          <span class="post-data">${escapeHtml(p.criado_em || '')}</span>
          <h3>${escapeHtml(p.titulo)}</h3>
          ${p.subtitulo ? `<p>${escapeHtml(p.subtitulo)}</p>` : ''}
          <div class="post-meta">
            ${p.autor ? `<span class="post-autor"><i class="fa-solid fa-user"></i> ${escapeHtml(p.autor)}</span>` : '<span></span>'}
            <span class="post-link">Ler mais <i class="fa-solid fa-arrow-right"></i></span>
          </div>
        </div>
      </a>
    `).join('');
  }catch(err){
    grid.innerHTML = `<div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i><p>Não foi possível carregar o blog. Tente novamente em breve.</p></div>`;
  }
}

carregarBlog();
</script>
</body>
</html>
